<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoPulse | Pollution Alerts</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                'eco-green': '#10B981',
                'eco-blue': '#3B82F6',
                'eco-purple': '#8B5CF6',
                'eco-orange': '#F97316',
                'eco-red': '#EF4444',
            }
        }
    }
}
</script>

</head>

<body class="bg-gray-50 text-gray-800">

<!-- Navbar -->
<nav class="bg-white shadow-md p-4 flex justify-between items-center">
<h1 class="text-2xl font-bold text-eco-green">Pollution Alerts 🚨</h1>
<a href="index.html" class="bg-eco-blue text-white px-4 py-2 rounded hover:bg-eco-purple transition">
⬅ Back Home
</a>
</nav>

<!-- Hero -->
<section class="text-center py-12 bg-gradient-to-r from-eco-green to-eco-blue text-white">
<h2 class="text-4xl font-bold mb-3">Live Environmental Alerts</h2>
<p class="opacity-90">Stay informed about critical pollution levels in major cities.</p>
</section>

<!-- Alerts Section -->
<section class="max-w-5xl mx-auto px-6 py-16">

<div id="alertsContainer" class="space-y-6"></div>

<div class="text-center mt-10">
<button onclick="generateAlert()" 
class="bg-eco-purple text-white px-6 py-2 rounded hover:bg-eco-orange transition">
Simulate New Alert
</button>
</div>

</section>

<script>

const cities = ["Delhi", "Mumbai", "Bangalore", "Chennai"];
const severities = [
{ label:"Low", color:"bg-eco-green" },
{ label:"Moderate", color:"bg-eco-blue" },
{ label:"High", color:"bg-eco-orange" },
{ label:"Severe", color:"bg-eco-red" }
];

function generateAlert(){

const city = cities[Math.floor(Math.random()*cities.length)];
const severity = severities[Math.floor(Math.random()*severities.length)];
const aqi = Math.floor(Math.random()*200 + 50);

const alertBox = document.createElement("div");
alertBox.className = "bg-white shadow-lg rounded-xl p-6 flex justify-between items-center";

alertBox.innerHTML = `
<div>
<h3 class="text-lg font-semibold">${city} AQI Alert</h3>
<p class="text-gray-600">Current AQI: <strong>${aqi}</strong></p>
<span class="text-white px-3 py-1 rounded ${severity.color}">
${severity.label}
</span>
</div>
<button onclick="this.parentElement.remove()" 
class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300 transition">
Dismiss
</button>
`;

document.getElementById("alertsContainer").prepend(alertBox);
}

// Generate one default alert on load
generateAlert();

</script>

</body>
</html>
